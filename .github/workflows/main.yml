name: Force Sync with Upstream Repository

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  force-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Sync upstream content but keep local workflows
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git remote add upstream https://github.com/ACL4SSR/ACL4SSR.git || true
          git fetch upstream master

          mkdir -p /tmp/upstream
          git archive upstream/master | tar -x -C /tmp/upstream

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/workflows/' \
            /tmp/upstream/ ./

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Sync with upstream"
            git push origin master
          fi
